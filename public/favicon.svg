<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Document shape -->
  <rect x="4" y="2" width="16" height="24" rx="1.5" fill="url(#grad)"/>
  
  <!-- Document lines (text representation) -->
  <line x1="7" y1="7" x2="17" y2="7" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <line x1="7" y1="11" x2="17" y2="11" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <line x1="7" y1="15" x2="14" y2="15" stroke="white" stroke-width="1.2" opacity="0.7"/>
  
  <!-- Eye (intelligence indicator) -->
  <circle cx="22" cy="18" r="6.5" fill="white" opacity="0.95"/>
  <circle cx="22" cy="18" r="3.5" fill="#3b82f6"/>
  <circle cx="23" cy="17" r="1.5" fill="white"/>
</svg>